<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport — prevents zoom, full screen mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Primary meta -->
    <title>Lantern</title>
    <meta name="description" content="Clear, calm guidance for overwhelming legal, financial, and employment situations. Works in 70 countries." />
    <meta name="keywords" content="legal advice, financial guidance, debt help, employment rights, benefits, tax help" />
    <meta name="author" content="Lantern" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#E9A84C" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Lantern" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lantern" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128.png" />

    <!-- Apple splash screens (optional but nice) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72.png" />
    <link rel="shortcut icon" href="/icons/icon-192.png" />

    <!-- Open Graph (for sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lantern — Legal & Financial Guidance" />
    <meta property="og:description" content="Clear, calm guidance for overwhelming legal, financial, and employment situations. Free to start." />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Lantern" />
    <meta name="twitter:description" content="Clear guidance for overwhelming legal, financial & employment situations." />
    <meta name="twitter:image" content="/icons/icon-512.png" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.anthropic.com" />

    <!-- Base styles — prevent flash of unstyled content -->
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body {
        margin: 0; padding: 0;
        background: #070C16;
        color: #EDE8DF;
        height: 100%;
        overflow: hidden;
        font-family: system-ui, sans-serif;
      }
      #root { height: 100%; }
      /* Splash fallback while JS loads */
      #splash {
        position: fixed; inset: 0;
        background: #070C16;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 16px;
        z-index: 99999;
        transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash-title {
        font-family: Georgia, serif;
        font-size: 36px;
        color: #E9A84C;
        letter-spacing: 3px;
      }
      #splash-sub {
        font-size: 13px;
        color: #7B8FA8;
        letter-spacing: 0.5px;
      }
    </style>
  </head>

  <body>
    <!-- Native splash (shows instantly before React loads) -->
    <div id="splash">
      <svg width="72" height="72" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 6L24 12" stroke="#E9A84C" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M21 8.5C21 7 22 6 24 6C26 6 27 7 27 8.5" stroke="#E9A84C" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M17 14Q24 11 31 14" stroke="#E9A84C" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <rect x="15" y="14" width="18" height="22" rx="3" fill="rgba(233,168,76,0.07)" stroke="#E9A84C" stroke-width="1.4"/>
        <ellipse cx="24" cy="26" rx="4.5" ry="6" fill="rgba(233,168,76,0.45)"/>
        <ellipse cx="24" cy="24.5" rx="2.8" ry="4" fill="rgba(255,220,140,0.75)"/>
        <ellipse cx="24" cy="23" rx="1.4" ry="2.2" fill="rgba(255,250,230,0.92)"/>
      </svg>
      <div id="splash-title">Lantern</div>
      <div id="splash-sub">Your guide through the overwhelming</div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Hide native splash once React mounts
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) splash.classList.add('hidden');
        }, 800);
      });

      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Lantern SW registered:', reg.scope))
            .catch(err => console.log('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
